<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/assets/icons/memory.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&family=Red+Rose:wght@700;900&display=swap" rel="stylesheet">
    <title>Memory Settings</title>
</head>
<body class="settings-body">
    <main class="settings">
        <div class="settings__inner">
            <section class="settings__left">
                <header class="settings__header">
                    <h1 class="settings__title">Settings</h1>
                    <span class="settings__underline" aria-hidden="true"></span>
                </header>

                <form class="settings__form" id="settings-form">
                    <!-- Game Themes -->
                    <fieldset class="settings-group" data-group="theme">
                        <legend class="settings-group__legend">
                            <span class="settings-group__icon settings-group__icon--theme" aria-hidden="true">
                                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                                    <path d="M12 2C6.49 2 2 6.49 2 12s4.49 10 10 10c1.38 0 2.5-1.12 2.5-2.5 0-.61-.23-1.2-.64-1.67-.08-.1-.13-.21-.13-.33 0-.28.22-.5.5-.5H16c3.31 0 6-2.69 6-6 0-4.96-4.49-9-10-9zm-5.5 9c-.83 0-1.5-.67-1.5-1.5S5.67 8 6.5 8 8 8.67 8 9.5 7.33 11 6.5 11zm3-4C8.67 7 8 6.33 8 5.5S8.67 4 9.5 4s1.5.67 1.5 1.5S10.33 7 9.5 7zm5 0c-.83 0-1.5-.67-1.5-1.5S13.67 4 14.5 4s1.5.67 1.5 1.5S15.33 7 14.5 7zm3 4c-.83 0-1.5-.67-1.5-1.5S16.67 8 17.5 8s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
                                </svg>
                            </span>
                            <span class="settings-group__title">Game themes</span>
                        </legend>

                        <ul class="settings-group__list">
                            <li class="settings-option">
                                <label class="settings-option__label">
                                    <input class="settings-option__input" type="radio" name="theme" value="code" checked>
                                    <span class="settings-option__marker" aria-hidden="true"></span>
                                    <span class="settings-option__text">Code vibes theme</span>
                                    <span class="settings-option__arrow" aria-hidden="true"></span>
                                </label>
                            </li>
                            <li class="settings-option">
                                <label class="settings-option__label">
                                    <input class="settings-option__input" type="radio" name="theme" value="games">
                                    <span class="settings-option__marker" aria-hidden="true"></span>
                                    <span class="settings-option__text">Gaming theme</span>
                                    <span class="settings-option__arrow" aria-hidden="true"></span>
                                </label>
                            </li>
                            <li class="settings-option">
                                <label class="settings-option__label">
                                    <input class="settings-option__input" type="radio" name="theme" value="da-projects">
                                    <span class="settings-option__marker" aria-hidden="true"></span>
                                    <span class="settings-option__text">DA Projects theme</span>
                                    <span class="settings-option__arrow" aria-hidden="true"></span>
                                </label>
                            </li>
                            <li class="settings-option">
                                <label class="settings-option__label">
                                    <input class="settings-option__input" type="radio" name="theme" value="foods">
                                    <span class="settings-option__marker" aria-hidden="true"></span>
                                    <span class="settings-option__text">Foods theme</span>
                                    <span class="settings-option__arrow" aria-hidden="true"></span>
                                </label>
                            </li>
                        </ul>
                    </fieldset>

                    <!-- Choose Player -->
                    <fieldset class="settings-group" data-group="player">
                        <legend class="settings-group__legend">
                            <span class="settings-group__icon settings-group__icon--player" aria-hidden="true">
                                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                                    <path d="M12 2c-2 0-3.5 1.5-3.5 3.5 0 1.3.7 2.4 1.8 3C8.5 9.2 7 11 7 13v2h2v6h6v-6h2v-2c0-2-1.5-3.8-3.3-4.5 1.1-.6 1.8-1.7 1.8-3C15.5 3.5 14 2 12 2z"/>
                                </svg>
                            </span>
                            <span class="settings-group__title">Choose player</span>
                        </legend>

                        <ul class="settings-group__list">
                            <li class="settings-option">
                                <label class="settings-option__label">
                                    <input class="settings-option__input" type="radio" name="player" value="blue">
                                    <span class="settings-option__marker" aria-hidden="true"></span>
                                    <span class="settings-option__text">Blue</span>
                                    <span class="settings-option__arrow" aria-hidden="true"></span>
                                </label>
                            </li>
                            <li class="settings-option">
                                <label class="settings-option__label">
                                    <input class="settings-option__input" type="radio" name="player" value="orange">
                                    <span class="settings-option__marker" aria-hidden="true"></span>
                                    <span class="settings-option__text">Orange</span>
                                    <span class="settings-option__arrow" aria-hidden="true"></span>
                                </label>
                            </li>
                        </ul>
                    </fieldset>

                    <!-- Board size -->
                    <fieldset class="settings-group" data-group="board">
                        <legend class="settings-group__legend">
                            <span class="settings-group__icon settings-group__icon--board" aria-hidden="true">
                                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="7" width="13" height="13" rx="2"/>
                                    <path d="M8 4h13v13"/>
                                </svg>
                            </span>
                            <span class="settings-group__title">Board size</span>
                        </legend>

                        <ul class="settings-group__list">
                            <li class="settings-option">
                                <label class="settings-option__label">
                                    <input class="settings-option__input" type="radio" name="board" value="16">
                                    <span class="settings-option__marker" aria-hidden="true"></span>
                                    <span class="settings-option__text">16 cards</span>
                                    <span class="settings-option__arrow" aria-hidden="true"></span>
                                </label>
                            </li>
                            <li class="settings-option">
                                <label class="settings-option__label">
                                    <input class="settings-option__input" type="radio" name="board" value="24">
                                    <span class="settings-option__marker" aria-hidden="true"></span>
                                    <span class="settings-option__text">24 cards</span>
                                    <span class="settings-option__arrow" aria-hidden="true"></span>
                                </label>
                            </li>
                            <li class="settings-option">
                                <label class="settings-option__label">
                                    <input class="settings-option__input" type="radio" name="board" value="36">
                                    <span class="settings-option__marker" aria-hidden="true"></span>
                                    <span class="settings-option__text">36 cards</span>
                                    <span class="settings-option__arrow" aria-hidden="true"></span>
                                </label>
                            </li>
                        </ul>
                    </fieldset>
                </form>
            </section>

            <section class="settings__right">
                <div class="preview">
                    <img
                        class="preview__image"
                        id="preview-image"
                        src="/assets/icons/Frame 629.png"
                        alt="Theme preview"
                        data-code="/assets/icons/Frame 629.png"
                        data-games="/assets/icons/Theme Visual-gaming.png"
                        data-da-projects="/assets/icons/Theme Visual.png"
                        data-foods="/assets/icons/Theme Visual-food.png"
                    >
                </div>

                <footer class="summary">
                    <ol class="summary__steps">
                        <li class="summary__step">Game theme</li>
                        <li class="summary__separator" aria-hidden="true"></li>
                        <li class="summary__step">Player</li>
                        <li class="summary__separator" aria-hidden="true"></li>
                        <li class="summary__step">Board size</li>
                    </ol>
                    <button type="button" class="summary__start" id="start-button">
                        <img class="summary__start-icon" src="/assets/icons/stadia_controller-small.png" alt="" aria-hidden="true">
                        <span>Start</span>
                    </button>
                </footer>
            </section>
        </div>
    </main>

    <script type="module" src="./settings.ts"></script>
</body>
</html>
