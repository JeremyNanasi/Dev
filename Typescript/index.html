<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/icons/mode_standby.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;800;900&display=swap" rel="stylesheet">
    <title>Memory</title>
</head>
<body>
    <div class="game">
        <header class="game__header">
            <section class="score" aria-label="Scores">
                <span class="score__item score__item--blue">
                    <span class="score__flag" aria-hidden="true"></span>
                    <span class="score__label">Blue</span>
                    <span class="score__value" id="score-blue">0</span>
                </span>
                <span class="score__item score__item--orange">
                    <span class="score__flag" aria-hidden="true"></span>
                    <span class="score__label">Orange</span>
                    <span class="score__value" id="score-orange">0</span>
                </span>
            </section>

            <section class="player" aria-label="Current player">
                <span class="player__label">Current player:</span>
                <span class="player__indicator player__indicator--blue" id="current-player"></span>
            </section>

            <button type="button" class="button button--ghost" id="exit-button">
                <span class="button__icon material-symbols-outlined" aria-hidden="true">move_item</span>
                <span class="button__text">Exit game</span>
            </button>
        </header>

        <main class="game__field" id="field" aria-label="Memory field"></main>
    </div>

    <div class="game-over" id="game-over-overlay" aria-hidden="true">
        <img class="game-over__image game-over__image--code" src="/assets/icons/Game over-green.png" alt="Game over">
        <div class="game-over__image game-over__image--games">GAME OVER</div>
        <div class="game-over__final" aria-hidden="true">
            <span class="game-over__final-title">Final score</span>
            <div class="game-over__final-scores">

                </span>

                    <span id="final-score-blue">0</span>
                </span>
            </div>
        </div>
    </div>

    <dialog class="modal" id="exit-modal" aria-labelledby="exit-modal-title">
        <div class="modal__content">
            <h2 class="modal__title" id="exit-modal-title">
                Are you sure you want to quit the game?
            </h2>
            <div class="modal__actions">
                <button type="button" class="button button--primary" id="cancel-exit">
                    Back to game
                </button>
                <button type="button" class="button button--secondary" id="confirm-exit">
                    Exit game
                </button>
            </div>
        </div>
    </dialog>

    <script type="module" src="./main.ts"></script>
</body>
</html>
